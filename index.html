<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ฝันดี ANGEL 🌸</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-deep:#0c0516;
  --bg-mid:#140824;
  --pink:#ffb3e6;
  --pink2:#ff6ec7;
  --pink3:#e040a8;
  --gold:#ffd6a5;
  --muted:rgba(255,255,255,0.65);
  --glass:rgba(255,255,255,0.04);
  --glass-border:rgba(255,255,255,0.08);
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
  height:100%;
  overflow:hidden;
  font-family:"Noto Sans Thai",system-ui;
  background:var(--bg-deep);
  color:#fff;
  cursor:none;
}

@media (hover: none) and (pointer: coarse) {
  html, body { cursor: auto; }
  #cursor, #cursor-trail { display: none; }
}

/* ─── CUSTOM CURSOR ─── */
#cursor{
  position:fixed;
  width:18px;height:18px;
  background:radial-gradient(circle,var(--pink2),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  top:0;left:0;
  transform:translate(-100px,-100px);
  mix-blend-mode:screen;
  will-change:transform;
}
#cursor-trail{
  position:fixed;
  width:6px;height:6px;
  background:var(--pink);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  top:0;left:0;
  transform:translate(-100px,-100px);
  opacity:.5;
  transition:transform .12s;
  will-change:transform;
}

/* ─── ANIMATED BG ─── */
#bg-canvas{
  position:fixed;
  inset:0;
  z-index:0;
}

/* ─── NOISE GRAIN ─── */
body::after{
  content:"";
  position:fixed;
  inset:0;
  opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
  pointer-events:none;
  z-index:1;
}

/* ─── FLOATING STARS ─── */
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  animation:twinkle var(--dur) ease-in-out infinite var(--delay);
}
@keyframes twinkle{
  0%,100%{opacity:.1;transform:scale(.8);}
  50%{opacity:.9;transform:scale(1.4);}
}

/* ─── SAKURA PETALS ─── */
.petal{
  position:absolute;
  width:8px;height:10px;
  background:radial-gradient(ellipse,var(--pink) 30%,transparent 80%);
  border-radius:50% 50% 50% 0;
  opacity:0;
  animation:petalFall var(--fdur) linear var(--fdelay) infinite;
  transform-origin:center center;
}
@keyframes petalFall{
  0%{transform:translateY(-40px) rotate(0deg) translateX(0);opacity:0;}
  10%{opacity:.8;}
  90%{opacity:.5;}
  100%{transform:translateY(110vh) rotate(540deg) translateX(var(--drift));opacity:0;}
}

/* ─── WRAP ─── */
.wrap{
  position:relative;
  z-index:10;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:28px;
  text-align:center;
  padding:24px;
}

/* ─── HEADER ─── */
.header-tag{
  font-size:11px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--pink);
  opacity:.7;
  animation:fadeSlide .8s both;
}

.title-wrap{
  animation:fadeSlide .8s .1s both;
}

h1{
  font-family:"Playfair Display",serif;
  font-style:italic;
  font-size:clamp(28px,6vw,48px);
  background:linear-gradient(135deg,#fff 0%,var(--pink) 40%,var(--gold) 80%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.2;
  filter:drop-shadow(0 0 20px rgba(255,110,199,.4));
}

.lead{
  margin-top:6px;
  font-size:13px;
  color:var(--muted);
  letter-spacing:1px;
}

@keyframes fadeSlide{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* ─── MAIN CARD ─── */
.card{
  display:flex;
  gap:22px;
  padding:24px 28px;
  width:min(92%,680px);
  border-radius:24px;
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  box-shadow:0 30px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.05);
  animation:fadeSlide .9s .2s both;
  transition:transform .3s,box-shadow .3s;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 40px rgba(255,110,199,.12);
}

.icon{
  flex-shrink:0;
  width:88px;height:88px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  background:linear-gradient(135deg,var(--pink2),var(--pink3));
}
.icon::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  border-radius:20px;
}
.icon img{width:100%;height:100%;object-fit:cover;}

.body{flex:1;text-align:left;}

.card-title{
  font-size:18px;
  font-weight:900;
  color:#fff;
}
.card-sub{
  font-size:12px;
  color:var(--pink);
  letter-spacing:1px;
  margin-top:2px;
}

.preview-msg{
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
  min-height:20px;
  transition:all .4s;
}

.controls{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* ─── BUTTONS ─── */
.btn{
  padding:10px 18px;
  border-radius:14px;
  cursor:none;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:white;
  font-family:"Noto Sans Thai",system-ui;
  font-weight:700;
  font-size:13px;
  letter-spacing:.5px;
  transition:all .25s;
  position:relative;
  overflow:hidden;
}
.btn::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  opacity:0;
  transition:opacity .25s;
}
.btn:hover::before{opacity:1;}
.btn:hover{transform:translateY(-1px);}
.btn:active{transform:scale(.97);}

.btn.pink{
  background:linear-gradient(135deg,var(--pink2),var(--pink3));
  border:none;
  box-shadow:0 4px 20px rgba(224,64,168,.4);
}
.btn.pink:hover{
  box-shadow:0 8px 30px rgba(224,64,168,.6);
}

/* ─── OVERLAY ─── */
.overlay{
  position:fixed;inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(12px);
  z-index:100;
}
.overlay.show{display:flex;}

/* ─── MODAL ─── */
.modal{
  width:90%;max-width:480px;
  padding:36px 32px;
  border-radius:28px;
  background:rgba(20,8,36,.85);
  border:1px solid rgba(255,179,230,.15);
  text-align:center;
  position:relative;
  overflow:hidden;
  animation:modalPop .45s cubic-bezier(.175,.885,.32,1.275) both;
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 60px rgba(255,110,199,.1);
}

.modal::before{
  content:"";
  position:absolute;
  top:-40%;left:-20%;
  width:140%;height:80%;
  background:radial-gradient(ellipse,rgba(255,110,199,.08),transparent 70%);
  pointer-events:none;
}

@keyframes modalPop{
  from{transform:scale(.85) translateY(20px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}

/* ─── AVATAR RING ─── */
.avatar-wrap{
  position:relative;
  width:120px;height:120px;
  margin:0 auto 22px;
}
.avatar-ring{
  position:absolute;inset:-6px;
  border-radius:50%;
  background:conic-gradient(var(--pink2),var(--gold),var(--pink),var(--pink2));
  animation:spin 4s linear infinite;
  opacity:.7;
}
@keyframes spin{to{transform:rotate(360deg);}}

.avatar-ring-blur{
  position:absolute;inset:-6px;
  border-radius:50%;
  background:conic-gradient(var(--pink2),var(--gold),var(--pink),var(--pink2));
  filter:blur(8px);
  animation:spin 4s linear infinite;
  opacity:.4;
}

.avatar{
  position:absolute;inset:0;
  border-radius:50%;
  overflow:hidden;
  border:3px solid var(--bg-deep);
}
.avatar img{width:100%;height:100%;object-fit:cover;}

/* ─── MESSAGE AREA ─── */
.msg-label{
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:var(--pink);
  opacity:.6;
  margin-bottom:12px;
}

.message{
  font-size:17px;
  line-height:1.75;
  color:rgba(255,255,255,.9);
  min-height:60px;
  transition:opacity .3s;
}

/* ─── STARS ROW ─── */
.stars-row{
  margin:16px 0 8px;
  display:flex;
  justify-content:center;
  gap:4px;
}
.stars-row span{
  font-size:14px;
  animation:starPop .5s cubic-bezier(.175,.885,.32,1.275) both;
}
.stars-row span:nth-child(1){animation-delay:.05s;}
.stars-row span:nth-child(2){animation-delay:.1s;}
.stars-row span:nth-child(3){animation-delay:.15s;}
.stars-row span:nth-child(4){animation-delay:.2s;}
.stars-row span:nth-child(5){animation-delay:.25s;}
@keyframes starPop{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}

.meta{
  font-size:12px;
  color:rgba(255,255,255,.3);
  margin-bottom:22px;
}

.modal .controls{
  justify-content:center;
}

/* ─── PROGRESS BAR ─── */
.progress-wrap{
  width:100%;
  height:3px;
  background:rgba(255,255,255,.06);
  border-radius:999px;
  margin-bottom:18px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--pink2),var(--gold));
  border-radius:999px;
  transition:width .6s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 8px var(--pink2);
}

/* ─── HEART BURST ─── */
.heart-burst{
  position:fixed;
  pointer-events:none;
  z-index:9997;
  font-size:16px;
  animation:heartFly 1.2s ease-out forwards;
}
@keyframes heartFly{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-80px) scale(.5);}
}

/* ─── BOTTOM DECORATION ─── */
.deco-text{
  font-size:11px;
  color:rgba(255,255,255,.15);
  letter-spacing:2px;
  animation:fadeSlide 1s .5s both;
}

/* ─── DONE STATE ─── */
.modal.done .avatar-ring{background:conic-gradient(#aaa,#555,#aaa);}

/* ─── MOOD CHECK OVERLAY ─── */
.mood-overlay{
  position:fixed;inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(14px);
  z-index:200;
}
.mood-overlay.show{display:flex;}
.mood-modal{
  width:90%;max-width:440px;
  padding:32px 28px;
  border-radius:28px;
  background:rgba(20,8,36,.9);
  border:1px solid rgba(255,179,230,.15);
  text-align:center;
  animation:modalPop .4s cubic-bezier(.175,.885,.32,1.275) both;
  box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 60px rgba(255,110,199,.1);
}
.mood-title{
  font-size:14px;letter-spacing:2px;
  color:var(--pink);margin-bottom:6px;opacity:.7;
}
.mood-question{
  font-size:20px;font-weight:900;
  margin-bottom:24px;line-height:1.4;
}
.mood-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;margin-bottom:16px;
}
.mood-btn{
  padding:16px 10px;border-radius:16px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  color:#fff;font-family:"Noto Sans Thai",system-ui;
  font-size:13px;font-weight:700;cursor:none;
  transition:all .25s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.mood-btn .mood-icon{font-size:28px;}
.mood-btn:hover{
  background:rgba(255,110,199,.15);
  border-color:rgba(255,110,199,.4);
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 8px 24px rgba(255,110,199,.2);
}
.mood-btn.selected{
  background:linear-gradient(135deg,rgba(255,110,199,.3),rgba(224,64,168,.2));
  border-color:var(--pink2);
  box-shadow:0 0 20px rgba(255,110,199,.3);
}

/* ─── SHAKE HINT ─── */
.shake-hint{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  z-index:50;
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  padding:10px 18px;border-radius:999px;
  font-size:12px;color:var(--muted);letter-spacing:.5px;
  animation:fadeSlide 1s 1s both, shakePulse 2s 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes shakePulse{
  0%,100%{transform:translateX(-50%) rotate(0deg);}
  20%{transform:translateX(-50%) rotate(-4deg);}
  40%{transform:translateX(-50%) rotate(4deg);}
  60%{transform:translateX(-50%) rotate(-2deg);}
  80%{transform:translateX(-50%) rotate(2deg);}
}
.shake-flash{
  position:fixed;inset:0;
  background:radial-gradient(circle,rgba(255,110,199,.3),transparent 70%);
  z-index:9000;pointer-events:none;opacity:0;
  animation:shakeFlash .6s ease-out forwards;
}
@keyframes shakeFlash{
  0%{opacity:1;}100%{opacity:0;}
}

/* ─── SHOOTING STAR ─── */
.shooting-star{
  position:fixed;
  top:0;left:0;
  width:3px;height:3px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  z-index:6;
  box-shadow:0 0 6px 2px rgba(255,179,230,.8);
  animation:shoot var(--sdur) linear var(--sdelay) infinite;
  opacity:0;
}
@keyframes shoot{
  0%{opacity:0;transform:translate(var(--sx),var(--sy)) rotate(var(--srot));}
  5%{opacity:1;}
  40%{opacity:.8;}
  60%{opacity:0;transform:translate(calc(var(--sx) + var(--sdx)),calc(var(--sy) + var(--sdy))) rotate(var(--srot));}
  100%{opacity:0;transform:translate(calc(var(--sx) + var(--sdx)),calc(var(--sy) + var(--sdy))) rotate(var(--srot));}
}

/* ─── NIGHT INTRO ─── */
.night-intro{
  position:fixed;inset:0;
  z-index:500;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(8,2,18,.97);
  animation:nightIntroFade 1s 2.8s ease-out forwards;
  pointer-events:none;
}
@keyframes nightIntroFade{
  to{opacity:0;pointer-events:none;}
}
.night-intro-text{
  font-family:"Playfair Display",serif;
  font-style:italic;
  font-size:clamp(22px,5vw,38px);
  background:linear-gradient(135deg,#fff,var(--pink),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:0;
  animation:nightTextIn .9s .3s ease-out forwards;
  text-align:center;line-height:1.4;
  filter:drop-shadow(0 0 20px rgba(255,110,199,.5));
}
.night-intro-sub{
  margin-top:12px;font-size:13px;
  color:var(--pink);opacity:0;letter-spacing:2px;
  animation:nightTextIn .9s .8s ease-out forwards;
}
@keyframes nightTextIn{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}
.night-stars-burst{
  position:absolute;inset:0;pointer-events:none;
  overflow:hidden;
}
.nb-star{
  position:absolute;
  font-size:16px;
  opacity:0;
  animation:nbStarPop var(--nd) var(--ndelay) ease-out forwards;
}
@keyframes nbStarPop{
  0%{opacity:0;transform:scale(0) translateY(0);}
  30%{opacity:1;transform:scale(1.3) translateY(-10px);}
  70%{opacity:.8;}
  100%{opacity:0;transform:scale(.5) translateY(-40px);}
}
</style>
</head>

<body>

<div id="cursor"></div>
<div id="cursor-trail"></div>
<canvas id="bg-canvas"></canvas>
<div id="petals"></div>
<div id="stars-bg"></div>

<div class="wrap">
  <div class="header-tag">✦ sweet dreams ✦</div>

  <div class="title-wrap">
    <h1>ฝันดี ANGEL 🌸</h1>
    <p class="lead">คืนนี้มีข้อความพิเศษรอเธออยู่</p>
  </div>

  <div class="card">
    <div class="icon">
      <img src="angel.jpg" id="previewImg" onerror="this.style.display='none'">
    </div>
    <div class="body">
      <div class="card-title">ฝันดีนะ Angel ✨</div>
      <div class="card-sub">GOODNIGHT MESSAGE</div>
      <div class="preview-msg" id="previewShort">เทอคับ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱ 💝</div>
      <div class="controls">
        <button class="btn pink" id="openBtn">รับข้อความ ✨</button>
        <button class="btn" id="moodBtn">🌙 mood check</button>
        <button class="btn" onclick="location.href='constellation.html'">🌟 วาดกลุ่มดาว</button>
        <button class="btn" id="resetBtn">🔄 รีเซ็ต</button>
        <button class="btn" id="soundBtn">🎵 เปิดเพลง</button>
      </div>
    </div>
  </div>

  <div class="deco-text">made with 💗 especially for you</div>
</div>

<!-- MOOD OVERLAY -->
<div class="mood-overlay" id="moodOverlay">
  <div class="mood-modal">
    <div class="mood-title">✦ mood check ✦</div>
    <div class="mood-question">วันนี้เจิ้ลเป็นยังไงบ้าง? 🌙</div>
    <div class="mood-grid">
      <button class="mood-btn" data-mood="happy" onclick="pickMood(this)">
        <span class="mood-icon">🌸</span><span>ดีมากเลย</span>
      </button>
      <button class="mood-btn" data-mood="tired" onclick="pickMood(this)">
        <span class="mood-icon">😴</span><span>เหนื่อยหน่อย</span>
      </button>
      <button class="mood-btn" data-mood="sad" onclick="pickMood(this)">
        <span class="mood-icon">🌧️</span><span>ไม่ค่อยดี</span>
      </button>
      <button class="mood-btn" data-mood="okay" onclick="pickMood(this)">
        <span class="mood-icon">☁️</span><span>ก็โอเคนะ</span>
      </button>
    </div>
    <button class="btn" style="width:100%;" onclick="closeMood()">ยังไม่อยากบอก 🌙</button>
  </div>
</div>

<!-- NIGHT INTRO (22:00–02:00) -->
<div class="night-intro" id="nightIntro" style="display:none;">
  <div class="night-stars-burst" id="nbStars"></div>
  <div class="night-intro-text">ดึกแล้วนะ Angel 🌙<br>นอนได้แล้วนะ</div>
  <div class="night-intro-sub">✦ sweet dreams ✦</div>
</div>
<div class="overlay" id="overlay">
  <div class="modal" id="modal">

    <div class="avatar-wrap">
      <div class="avatar-ring-blur"></div>
      <div class="avatar-ring"></div>
      <div class="avatar">
        <img src="angel.jpg" onerror="this.style.background='linear-gradient(135deg,#ffb3e6,#ff6ec7)'">
      </div>
    </div>

    <div class="msg-label">✦ ข้อความฝันดี ✦</div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="message" id="message">...</div>

    <div class="stars-row" id="starsRow">
      <span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
    </div>

    <div class="meta" id="meta"></div>

    <div class="controls">
      <button class="btn pink" id="nextBtn">ข้อความถัดไป ✨</button>
      <button class="btn" id="closeBtn">ปิด</button>
    </div>
  </div>
</div>

<audio id="bgm" loop>
  <source src="melt with you (feat. Ccn) [1fZusKAxA4w].mp3" type="audio/mpeg">
</audio>

<script>
// ─── PHOTOS ───
const PHOTOS = [
  "848d5638-3c1c-4ba1-b15d-6e510e74c094.jpg",
  "02b69c3c-7cf4-4c05-a683-4beac2f75138.jpg",
  "09af00b3-a3d8-4c48-b42a-6a606344cbe5.jpg",
  "c37b936e-b606-4069-a208-56946e16ea1a.jpg",
  "6da5e1db-6a3c-4be0-a1f3-1a817bc2dc51.jpg",
];

}

// ─── CANVAS BG ─── (animated nebula)
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const orbs = Array.from({length: 5}, (_, i) => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: 200 + Math.random() * 250,
  vx: (Math.random() - .5) * .25,
  vy: (Math.random() - .5) * .25,
  hue: [300, 280, 320, 260, 340][i],
  alpha: .06 + Math.random() * .06,
}));

function drawBg() {
  ctx.clearRect(0, 0, W, H);

  // deep bg
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#0c0516");
  grad.addColorStop(1, "#140824");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  orbs.forEach(o => {
    o.x += o.vx;
    o.y += o.vy;
    if (o.x < -o.r) o.x = W + o.r;
    if (o.x > W + o.r) o.x = -o.r;
    if (o.y < -o.r) o.y = H + o.r;
    if (o.y > H + o.r) o.y = -o.r;

    const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
    g.addColorStop(0, `hsla(${o.hue},80%,70%,${o.alpha})`);
    g.addColorStop(1, `hsla(${o.hue},80%,50%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}
drawBg();
