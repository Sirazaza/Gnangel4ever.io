<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ฝันร้ายจงออกไปปิ้วๆ ฝันดีในทุกๆวันต่อให้ไม่มีใครบอกเว็บนี้จะบอกเอง!</title>

<style>
  :root{
    --bg1:#13081a; --bg2:#1a0b24;
    --pink1:#ff9bd5; --pink2:#ff73c6;
    --muted:rgba(255,255,255,0.75);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:"Inter","Noto Sans Thai",system-ui;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:white;}

  /* 🌸 floating particles */
  .float{position:absolute;border-radius:50%;background:radial-gradient(circle,var(--pink1),transparent 70%);filter:blur(3px);opacity:.6;animation:floatUp 12s linear infinite}
  @keyframes floatUp{
    0%{transform:translateY(120vh) scale(.4);opacity:0}
    20%{opacity:1}
    100%{transform:translateY(-20vh) scale(1);opacity:0}
  }

  /* 🐱 floating cat images */
  .floating-cat{
    position:absolute;
    border-radius:999px;
    overflow:hidden;
    opacity:0.7;
    filter:blur(1px) drop-shadow(0 0 14px rgba(255,130,180,0.45));
    animation:floatCat 12s ease-in-out infinite;
    z-index:1;
  }
  .floating-cat img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  @keyframes floatCat{
    0%{transform:translate(0,0) scale(1);}
    50%{transform:translate(60px,-40px) scale(1.06);}
    100%{transform:translate(0,0) scale(1);}
  }

  /* 🌸 center content */
  .wrap{
    position:relative;
    z-index:10;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    text-align:center;
    padding:24px;
  }

  h1{font-size:28px}
  p.lead{color:var(--muted);font-size:14px;margin-bottom:12px}

  /* 🔮 preview card */
  .card-preview{
    display:flex;
    gap:18px;
    padding:20px;
    width:min(92%,780px);
    border-radius:18px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(8px);
    box-shadow:0 18px 50px rgba(0,0,0,.55);
    align-items:center;
  }

  .preview-icon{
    width:90px;height:90px;border-radius:18px;
    overflow:hidden;flex-shrink:0;
    background:linear-gradient(135deg,var(--pink1),var(--pink2));
    box-shadow:0 8px 30px rgba(255,110,180,0.15);
  }
  .preview-icon img{width:100%;height:100%;object-fit:cover}

  .preview-body{text-align:left;flex:1;}
  .preview-body .name{font-weight:800;font-size:18px}
  .preview-body .title{font-weight:900;font-size:20px;color:#ffd7f3;margin-top:4px}
  .preview-body .msg{margin-top:8px;color:var(--muted);font-size:15px}

  /* buttons */
  .controls{margin-top:14px;display:flex;gap:12px;flex-wrap:wrap}
  .btn{padding:10px 14px;border-radius:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:white;transition:.12s}
  .btn.pink{background:linear-gradient(90deg,var(--pink1),var(--pink2));border:none;box-shadow:0 8px 24px rgba(255,110,180,.25)}
  .btn:active{transform:scale(.96)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:20}
  .overlay.show{display:flex}
  .modal{
    width:100%;max-width:560px;padding:24px;border-radius:20px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 30px 70px rgba(0,0,0,.7);
    transform:translateY(16px);
    opacity:0;
    transition:.28s cubic-bezier(.2,.9,.28,1);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .overlay.show .modal{opacity:1;transform:none;}

  .avatar{
    width:130px;height:130px;border-radius:18px;overflow:hidden;
    margin-bottom:14px;background:linear-gradient(135deg,var(--pink1),var(--pink2));
    box-shadow:0 12px 34px rgba(255,110,180,.2);
  }
  .avatar img{width:100%;height:100%;object-fit:cover}

  .message{color:var(--muted);font-size:16px;line-height:1.6;margin-top:6px}
  .meta{color:#bbb;font-size:13px;margin-top:10px}

</style>
</head>

<body>

<!-- background particles -->
<div id="particles"></div>

<!-- 🐱 floating cats -->
<div id="catFloatingArea"></div>

<div class="wrap">
  <h1>ฝันดี ANGEL 🌸</h1>
  <p class="lead">กดเพื่อสุ่มบอกฝันดีจะได้มะฝันร้าย</p>

  <div class="card-preview">
    <div class="preview-icon"><img id="previewImg" alt=""></div>

    <div class="preview-body">
      <div class="name">ANGEL</div>
      <div class="title">ฝันดี ANGEL ✨</div>
      <div class="msg" id="previewShort">กดเพื่อที่จะดั้ยฝานดี</div>

      <div class="controls">
        <button class="btn pink" id="openBtn">กดดิน้อง ✨</button>
        <button class="btn" id="resetBtn">รีเซ็ต</button>
        <button class="btn" id="soundToggle">Melt with u กล่อม</button>
      </div>
    </div>
  </div>
</div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="avatar"><img id="modalImg" alt=""></div>
    <div class="name">ANGEL</div>
    <div class="message" id="message"></div>
    <div class="meta" id="metaInfo"></div>

    <div class="controls" style="margin-top:16px">
      <button class="btn pink" id="nextBtn">อีกข้อความ</button>
      <button class="btn" id="closeBtn">ปิด</button>
      <button class="btn" id="resetSmall">รีเซ็ต</button>
    </div>
  </div>
</div>

<script>
/* Load ANGEL image */
document.getElementById("previewImg").src = "angel.jpg";
document.getElementById("modalImg").src = "angel.jpg";

/* Create floating background circles */
(function particles(){
  const p=document.getElementById("particles");
  for(let i=0;i<34;i++){
    const s=document.createElement("div");
    s.className="float";
    s.style.left=Math.random()*100+"%";
    s.style.width=s.style.height=8+Math.random()*20+"px";
    s.style.animationDelay=Math.random()*8+"s";
    s.style.animationDuration=10+Math.random()*10+"s";
    s.style.opacity=(0.3+Math.random()*0.6);
    p.appendChild(s);
  }
})();

/* 🐱 floating cats */
(function floatingCats(){
  const area=document.getElementById("catFloatingArea");
  for(let i=0;i<6;i++){
    const d=document.createElement("div");
    d.className="floating-cat";
    const img=document.createElement("img");
    img.src="cat.png";
    d.appendChild(img);

    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    d.style.animationDelay=Math.random()*6+"s";

    const size=90+Math.random()*50;
    d.style.width=d.style.height=size+"px";

    area.appendChild(d);
  }
})();

/* messages */
const M=[
"คืนนี้ขอให้หลับฝันดี เหมือนลอยอยู่ในโลกแห่งความนุ่มนวล ✨",
"ขอให้แองเจิ้ลฝันเห็นดวงดาวที่สวยที่สุด แล้วตื่นมาพร้อมรอยกับรอยยิ้มที่ฉวยที่ฉุด 😊",
"ใ今天累了吗？希望明天的 ANGEL 醒来时精神满满，不再疲倦。今晚不要做噩梦哦。꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱⸒⸒ 🌸",
"คืนนี้กองกำลัง “กันฝันร้าย” จะปกป้องเจิ้ลเอง 💖",
"วันนี้เหนื่อยไหม ขอให้แองเจิ้ลในวันพรุ่งนี้ตื่นมาสดใสไม่เหนื่อย! และวันนี้หลับไม่ฝันร้าย 🛌",
"หลับฝันดีนะ ANGEL ☁️💗",
"คืนนี้ดาวทุกดวงจะคอยปกป้องเธอ 🌟",
"คืนนี้ดวงดาวทุกดวงจะยิ้มให้เจิ้ล ขอให้ตื่นมาแล้วรู้สึกนุ่มนวลดั่งอยู่บนเมฆ 💫",
"หวังว่าความรู้สึกของเจิ้ลจะไม่ถูกใครทำร้ายอีกนะ ต่อให้วันนี้มันไม่ดี ก็ขอให้พรุ่งนี้เบาลงนิดนึงก็ยังดี🎀",
"วันนี้เจิ้ลเก่งมากเยย แม้จะเหนื่อยก็ยังผ่านมาได้ ขอให้คืนนี้หลับลึก ไม่ฝันร้ายเลยสักนิด 🌙",
"หวังว่าเจิ้ลจะหลับแบบไม่ตื่นกลางดึกนะ 🌙",
"เจิ้ลเก่งพอแล้ว แม้วันที่ไม่ไหวก็ยังพยายามอยู่ดี💖 ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱⸒⸒",
"ไม่ต้องเข้มแข็งตลอดก็ได้ พักบ้างก็ไม่ผิดอะไร ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱⸒⸒",
"愿你的心不再被谁伤到。你值得更好的☁️💗",
"ขอให้คืนนี้ไม่มีฝันร้ายเลยสักนิดเดียว",
"มีบางสิ่งที่เจิ้ลลืมพัก… เดาว่าคือ “ตัวเอง” ใช่ไหม eiei",
"อิอิอิอิอิอิอิอิอิอิอิิอิอิอิ งงอะดิจะได้นอน.꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱",
"เทอคับ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱",
"อย่าลืมชาจแบต ที่หมายถึงแบตมือถือแกด้วย!",
"งิ๋งแปลว่าไรนะ....",
"เทอเหนื่อยไหม ;-;",
"เทอคับบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบบ꒰ᐢ⸝⸝•༝•⸝⸝ᐢ꒱"
];
let order=[...Array(M.length).keys()].sort(()=>Math.random()-.5);
let idx=0;

/* audio */
const audio=new Audio("melt with you (feat. Ccn) [1fZusKAxA4w].mp3");
audio.loop=true; audio.volume=.23;
let sound=false;

/* elements */
const overlay=document.getElementById("overlay");
const msg=document.getElementById("message");
const meta=document.getElementById("metaInfo");
const previewShort=document.getElementById("previewShort");

/* show card */
function openCard(first=true){
  const t=M[order[idx]]; idx++;
  msg.textContent=t;
  meta.textContent="เหลืออีก "+(M.length-idx)+" ข้อความ";

  previewShort.textContent=t.length>90?t.slice(0,90)+"…":t;

  overlay.classList.add("show");

  if(first){
    sound=true;
    document.getElementById("soundToggle").textContent="ปิดเสียง";
    audio.currentTime=0; audio.play().catch(()=>{});
  } else {
    if(sound) audio.play().catch(()=>{});
  }
}

/* close */
function closeCard(){ overlay.classList.remove("show"); audio.pause(); audio.currentTime=0; }

/* buttons */
document.getElementById("openBtn").onclick=()=>openCard(true);
document.getElementById("nextBtn").onclick=()=>openCard(false);
document.getElementById("closeBtn").onclick=closeCard;

document.getElementById("resetBtn").onclick=()=>{
  order=[...Array(M.length).keys()].sort(()=>Math.random()-.5); idx=0;
  alert("รีเซ็ตแล้วค่ะ 💖");
};
document.getElementById("resetSmall").onclick=()=>{
  order=[...Array(M.length).keys()].sort(()=>Math.random()-.5); idx=0;
  closeCard();
  setTimeout(()=>openCard(true),200);
};

/* toggle sound */
document.getElementById("soundToggle").onclick=()=>{
  sound=!sound;
  document.getElementById("soundToggle").textContent=sound?"ปิดเสียง":"เปิดเสียง";
  if(sound){
    audio.currentTime=0;
    audio.play().catch(()=>{});
  } else {
    audio.pause(); audio.currentTime=0;
  }
};

overlay.onclick=e=>{if(e.target===overlay) closeCard();}
</script>

</body>
</html>
